# Template Postgres configuration for Bleat Backend
# Use environment variables or set these values in a secure way (do NOT commit production credentials).

# Example values (adjust as needed):
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bleat}
spring.datasource.username=${DB_USER:bleat}
spring.datasource.password=${DB_PASS:bleat_pass}

# Connection pool (HikariCP via Spring Boot) tuning
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=600000

# Flyway (if later added) location for migrations
# spring.flyway.enabled=true
# spring.flyway.locations=classpath:db/migration

# Logging
logging.level.org.springframework.jdbc=INFO

# Note: The project currently bypasses Spring DataSource auto-configuration
# because `application.properties` excludes it. The next step is to
# refactor `DBHandler` to be configuration-driven or enable Spring-managed
# DataSource usage. See migration TODOs in the repo root.
