spring.application.name=Bleat Child Security System
server.port=8081
server.servlet.context-path=/bleat

# DATABASE CONFIG
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=BLEAT;encrypt=false;trustServerCertificate=true
spring.datasource.username=javauser2
spring.datasource.password=Please1
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# HIBERNATE / JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# FIX: Missing Hibernate Dialect (this was causing the crash)
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# LOGGING
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.boot=DEBUG
logging.level.org.springframework.web.servlet=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE
